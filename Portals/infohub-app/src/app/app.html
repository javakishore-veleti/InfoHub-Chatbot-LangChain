<div class="app-shell">
  <header class="topbar">
    <div class="container-fluid topbar-inner d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div class="d-flex align-items-center gap-3">
        <span class="icon-pill"><i class="fa-solid fa-layer-group"></i></span>
        <div>
          <div class="brand-title">InfoHub Platform</div>
          <div class="brand-subtitle">Workflow operations and execution intelligence</div>
        </div>
      </div>

      <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
        <nav class="main-nav nav nav-pills">
          <a class="nav-link" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <i class="fa-solid fa-house me-1"></i>Home
          </a>
          <a class="nav-link" routerLink="/ingest/workflows" routerLinkActive="active">
            <i class="fa-solid fa-inbox me-1"></i>Ingest
          </a>
          <a class="nav-link" routerLink="/model-build" routerLinkActive="active">
            <i class="fa-solid fa-hexagon-nodes me-1"></i>Model Build
          </a>
          <a class="nav-link" routerLink="/administration" routerLinkActive="active">
            <i class="fa-solid fa-shield-halved me-1"></i>Administration
          </a>
        </nav>

        <button class="btn btn-outline-secondary btn-sm theme-toggle" type="button" (click)="toggleTheme()" [attr.aria-label]="isDarkTheme() ? 'Switch to light mode' : 'Switch to dark mode'">
          <i class="fa-solid" [ngClass]="isDarkTheme() ? 'fa-sun' : 'fa-moon'"></i>
          <span class="ms-2">{{ isDarkTheme() ? 'Light' : 'Dark' }}</span>
        </button>
      </div>
    </div>
  </header>

  <div class="app-body">
    @if (isIngestDomain()) {
      <aside class="left-panel">
        <div class="left-nav-card p-3">
          <h6 class="mb-1 fw-bold">Ingest Domain</h6>
          <p class="text-secondary small mb-2">Run and monitor ingest workflows</p>

          <div class="left-nav-label">Workflows</div>
          <nav class="nav flex-column">
            <a class="nav-link" routerLink="/ingest/workflows" routerLinkActive="active">
              <i class="fa-solid fa-diagram-project me-2"></i>Workflow Catalog
            </a>
            <a class="nav-link" routerLink="/ingest/run" routerLinkActive="active">
              <i class="fa-solid fa-play me-2"></i>Run Workflow
            </a>
          </nav>

          <div class="left-nav-label">Executions</div>
          <nav class="nav flex-column">
            <a class="nav-link" routerLink="/ingest/executions" routerLinkActive="active">
              <i class="fa-solid fa-clock-rotate-left me-2"></i>Execution History
            </a>
          </nav>
        </div>
      </aside>
    }

    <main class="content-area" [ngClass]="{ 'full-width': !isIngestDomain() }">
      <router-outlet />
    </main>
  </div>
</div>
