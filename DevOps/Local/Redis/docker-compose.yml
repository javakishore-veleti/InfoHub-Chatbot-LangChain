name: InfoHub-Chatbot-LangChain

services:
  redis:
    image: redis:7-alpine
    container_name: infohub-chatbot-lc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - infohub-chatbot-lc-net

volumes:
  redis-data:

networks:
  infohub-chatbot-lc-net:
    external: true
